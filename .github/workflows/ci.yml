name: Frontend CI/CD — Test, Version, ECR, Deploy

on:
  push:
    branches: ['**']   # cualquier push a cualquier rama

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: app-alumnos-frontend

# Permisos necesarios para que github-actions[bot] pueda crear tags
permissions:
  contents: write

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: TEST — si falla, todo se detiene
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Tests (cobertura ≥ 90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm install

      - name: Tests con cobertura
        run: npm run test:coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: VERSIONING — calcula v1.x.0 y crea el tag
# ─────────────────────────────────────────────────────────────────────────────
  versioning:
    name: Semantic Version (v1.x.0)
    runs-on: ubuntu-latest
    needs: test
    outputs:
      new_tag: ${{ steps.calc.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}   # token con permisos de escritura

      - name: Calcular y crear tag
        id: calc
        run: |
          LAST=$(git tag --list 'v1.*' --sort=-v:refname | head -1)
          if [ -z "$LAST" ]; then
            NEW="v1.0.0"
          else
            MINOR=$(echo $LAST | cut -d. -f2)
            NEW="v1.$((MINOR + 1)).0"
          fi
          echo "Último: ${LAST:-ninguno} → Nuevo: $NEW"
          echo "new_tag=$NEW" >> $GITHUB_OUTPUT
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW
          git push origin $NEW

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: BUILD & PUSH ECR
# ─────────────────────────────────────────────────────────────────────────────
  build-push-ecr:
    name: Build & Push ECR (${{ needs.versioning.outputs.new_tag }})
    runs-on: ubuntu-latest
    needs: versioning
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build y push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ needs.versioning.outputs.new_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4: DEPLOY EKS
# ─────────────────────────────────────────────────────────────────────────────
  deploy-eks:
    name: Deploy Frontend to EKS
    runs-on: ubuntu-latest
    needs: build-push-ecr

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Update frontend image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          kubectl set image deployment/app-alumnos-frontend \
          frontend="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/${{ env.IMAGE_NAME }}:latest" \
          -n app-alumnos

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/app-alumnos-frontend \
            -n app-alumnos \
            --timeout=5m

      - name: Get deployment status
        if: always()
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployment app-alumnos-frontend -n app-alumnos -o wide
          echo ""
          echo "=== ReplicaSets ==="
          kubectl get rs -n app-alumnos -l app=app-alumnos-frontend
          echo ""
          echo "=== Events ==="
          kubectl get events -n app-alumnos --sort-by='.lastTimestamp' | tail -20