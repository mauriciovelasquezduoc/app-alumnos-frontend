apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-alumnos-frontend-hpa
  namespace: app-alumnos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-alumnos-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
