apiVersion: v1
kind: Service
metadata:
  name: app-alumnos-frontend
  namespace: app-alumnos
  annotations:
    # Indicamos que el LB lo maneja el AWS Load Balancer Controller
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    # Forzamos que sea público y (no interno)
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: app-alumnos-frontend
  ports:
    - port: 80
      targetPort: 80
